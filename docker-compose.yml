services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: quant-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - /home/ubuntu/.qlib/qlib_data:/root/.qlib/qlib_data
    environment:
      - PYTHONUNBUFFERED=1
      - API_KEY=${API_KEY:-}
      - TDX_API_KEY=${TDX_API_KEY:-}
      - TDX_MCP_URL=${TDX_MCP_URL:-https://mcp.tdx.com.cn:3001/mcp}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_QUICK_MODEL=${LLM_QUICK_MODEL:-glm-5.1}
      - LLM_DEEP_MODEL=${LLM_DEEP_MODEL:-glm-5.2}
    mem_limit: 1200m
    cpus: 1.5
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: quant-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:80"
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
